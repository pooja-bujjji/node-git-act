name: matrix-build

on: 
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24, 22, 20]
    steps:
      

      - name: install nodejs
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

     
      